AWSTemplateFormatVersion: "2010-09-09"
Description: Shared security infrastructure for all projects

Parameters:
  TemplateBucketName:
    Type: String
    Description: S3 bucket containing nested CloudFormation templates

  GitHubOwner:
    Type: String
    Default: rshdhere
    Description: GitHub organization or user that owns this repository

  GitHubRepository:
    Type: String
    Default: cloud-formation
    Description: GitHub repository name allowed to assume the deployment role

  GitHubBranch:
    Type: String
    Default: main
    Description: Git branch allowed to assume the deployment role

  DeployUserName:
    Type: String
    Default: transcoding-infra
    Description: IAM user that runs local aws cloudformation deploy

Resources:
  SecurityGroupsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.${AWS::Region}.amazonaws.com/shared/security/security-groups.yaml"

      Parameters:
        VpcId: !ImportValue shared-networking-VpcId

  GitHubOIDCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.${AWS::Region}.amazonaws.com/shared/security/github-oidc.yaml"

      Parameters:
        GitHubOwner: !Ref GitHubOwner
        GitHubRepository: !Ref GitHubRepository
        GitHubBranch: !Ref GitHubBranch

  DeployUserIamStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.${AWS::Region}.amazonaws.com/shared/security/deploy-user-iam.yaml"
      Parameters:
        DeployUserName: !Ref DeployUserName

Outputs:
  AlbSecurityGroupId:
    Description: ALB Security Group ID
    Value: !GetAtt SecurityGroupsStack.Outputs.AlbSecurityGroupId
    Export:
      Name: shared-security-AlbSecurityGroupId

  AppSecurityGroupId:
    Description: Application Security Group ID
    Value: !GetAtt SecurityGroupsStack.Outputs.AppSecurityGroupId
    Export:
      Name: shared-security-AppSecurityGroupId

  ProxySecurityGroupId:
    Description: Proxy Security Group ID
    Value: !GetAtt SecurityGroupsStack.Outputs.ProxySecurityGroupId
    Export:
      Name: shared-security-ProxySecurityGroupId

  DatabaseSecurityGroupId:
    Description: Database Security Group ID
    Value: !GetAtt SecurityGroupsStack.Outputs.DatabaseSecurityGroupId
    Export:
      Name: shared-security-DatabaseSecurityGroupId

  GitHubOIDCProviderArn:
    Description: GitHub OIDC provider ARN
    Value: !GetAtt GitHubOIDCStack.Outputs.GitHubOIDCProviderArn
    Export:
      Name: shared-security-GitHubOIDCProviderArn

  GithubActionsCloudFormationRoleArn:
    Description: GitHub Actions CloudFormation deployment role ARN
    Value: !GetAtt GitHubOIDCStack.Outputs.GithubActionsCloudFormationRoleArn
    Export:
      Name: shared-security-GithubActionsCloudFormationRoleArn

  VtpDeployUserPolicyName:
    Description: Inline IAM policy name granting vtp-* role management to the deploy user
    Value: !GetAtt DeployUserIamStack.Outputs.DeployUserPolicyName
