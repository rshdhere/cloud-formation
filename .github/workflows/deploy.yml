name: Deploy CloudFormation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 591446361969
  TEMPLATE_BUCKET_NAME: raashed-cf-templates-ap-south-1
  ENVIRONMENT: prod
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME || 'example.com' }}
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID || '' }}
  ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
  HAS_BOOTSTRAP_CREDS: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID != '' && secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure bootstrap AWS credentials
        env:
          AWS_BOOTSTRAP_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_BOOTSTRAP_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
        if: ${{ env.HAS_BOOTSTRAP_CREDS == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsBootstrap

      - name: Configure AWS credentials
        if: ${{ env.HAS_BOOTSTRAP_CREDS != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GithubActionsCloudFormationRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsCloudFormation

      - name: Sync templates to S3
        run: |
          aws s3 sync shared "s3://${TEMPLATE_BUCKET_NAME}/shared" \
            --exclude "*" \
            --include "*.yaml" \
            --delete

          aws s3 sync projects/video-transcoding "s3://${TEMPLATE_BUCKET_NAME}/projects/video-transcoding" \
            --exclude "*" \
            --include "*.yaml" \
            --delete

      - name: Deploy shared networking
        run: |
          aws cloudformation deploy \
            --stack-name shared-networking \
            --template-file shared/networking/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides TemplateBucketName="${TEMPLATE_BUCKET_NAME}"

      - name: Deploy shared security
        run: |
          create_deploy_user_iam="true"
          if [ "${HAS_BOOTSTRAP_CREDS}" = "true" ]; then
            create_deploy_user_iam="false"
          fi

          aws cloudformation deploy \
            --stack-name shared-security \
            --template-file shared/security/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              GitHubOwner=rshdhere \
              GitHubRepository=cloud-formation \
              GitHubBranch=main \
              CreateDeployUserIam="${create_deploy_user_iam}"

      - name: Reconfigure AWS credentials via OIDC
        if: ${{ env.HAS_BOOTSTRAP_CREDS == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GithubActionsCloudFormationRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsCloudFormation

      - name: Attach deploy-user IAM policy
        if: ${{ env.HAS_BOOTSTRAP_CREDS == 'true' }}
        run: |
          aws cloudformation deploy \
            --stack-name shared-security \
            --template-file shared/security/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              GitHubOwner=rshdhere \
              GitHubRepository=cloud-formation \
              GitHubBranch=main \
              CreateDeployUserIam=true

      - name: Reset shared monitoring stack if it is stuck
        run: |
          set -euo pipefail

          if aws cloudformation describe-stacks \
            --stack-name shared-monitoring \
            --region "${AWS_REGION}" \
            >/dev/null 2>&1; then
            stack_status="$(
              aws cloudformation describe-stacks \
                --stack-name shared-monitoring \
                --region "${AWS_REGION}" \
                --query 'Stacks[0].StackStatus' \
                --output text
            )"

            case "${stack_status}" in
              ROLLBACK_FAILED|ROLLBACK_COMPLETE|DELETE_FAILED|UPDATE_ROLLBACK_FAILED)
                aws cloudformation delete-stack \
                  --stack-name shared-monitoring \
                  --region "${AWS_REGION}"

                aws cloudformation wait stack-delete-complete \
                  --stack-name shared-monitoring \
                  --region "${AWS_REGION}"
                ;;
            esac
          fi

      - name: Deploy shared cache
        run: |
          aws cloudformation deploy \
            --stack-name shared-cache \
            --template-file shared/cache/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              Environment="${ENVIRONMENT}"

      - name: Deploy shared database
        run: |
          aws cloudformation deploy \
            --stack-name shared-database \
            --template-file shared/database/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              Environment="${ENVIRONMENT}"

      - name: Deploy shared monitoring
        run: |
          aws cloudformation deploy \
            --stack-name shared-monitoring \
            --template-file shared/monitoring/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              AlertEmail="${ALERT_EMAIL:-}"

      - name: Deploy video-transcoding
        run: |
          aws cloudformation deploy \
            --stack-name video-transcoding \
            --template-file projects/video-transcoding/template.yaml \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplateBucketName="${TEMPLATE_BUCKET_NAME}" \
              Environment="${ENVIRONMENT}" \
              DomainName="${DOMAIN_NAME}" \
              UploadsBucketName=vtp-uploads \
              TranscodedBucketName=vtp-transcoded \
              CorsAllowedOrigins="https://app.${DOMAIN_NAME}" \
              TranscodingQueueName=vtp-transcoding \
              EmailVerificationQueueName=vtp-email-verification \
              ResendFromEmail="noreply@${DOMAIN_NAME}" \
              AlbCertificateArn="${ALB_CERTIFICATE_ARN:-}" \
              CloudFrontCertificateArn="${CLOUDFRONT_CERTIFICATE_ARN:-}" \
              HostedZoneId="${HOSTED_ZONE_ID:-}" \
              ApiImageTag="${API_IMAGE_TAG:-latest}" \
              WorkerImageTag="${WORKER_IMAGE_TAG:-latest}" \
              WebImageTag="${WEB_IMAGE_TAG:-latest}"
        env:
          ALB_CERTIFICATE_ARN: ${{ vars.ALB_CERTIFICATE_ARN }}
          CLOUDFRONT_CERTIFICATE_ARN: ${{ vars.CLOUDFRONT_CERTIFICATE_ARN }}
          API_IMAGE_TAG: ${{ vars.API_IMAGE_TAG }}
          WORKER_IMAGE_TAG: ${{ vars.WORKER_IMAGE_TAG }}
          WEB_IMAGE_TAG: ${{ vars.WEB_IMAGE_TAG }}
