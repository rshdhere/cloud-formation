AWSTemplateFormatVersion: "2010-09-09"
Description: ECR repositories for VTP container images

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: vtp-api
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 20 tagged images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: vtp-api
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

  WorkerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: vtp-worker
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 20 tagged images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: vtp-worker
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: vtp-web
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 20 tagged images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: vtp-web
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

Outputs:
  EcrApiRepositoryUri:
    Description: ECR URI for the Bun API image
    Value: !GetAtt ApiRepository.RepositoryUri

  EcrWorkerRepositoryUri:
    Description: ECR URI for the Go worker image
    Value: !GetAtt WorkerRepository.RepositoryUri

  EcrWebRepositoryUri:
    Description: ECR URI for the Next.js web image
    Value: !GetAtt WebRepository.RepositoryUri

  EcrApiRepositoryArn:
    Description: ECR ARN for the Bun API image
    Value: !GetAtt ApiRepository.Arn

  EcrWorkerRepositoryArn:
    Description: ECR ARN for the Go worker image
    Value: !GetAtt WorkerRepository.Arn

  EcrWebRepositoryArn:
    Description: ECR ARN for the Next.js web image
    Value: !GetAtt WebRepository.Arn
