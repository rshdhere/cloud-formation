AWSTemplateFormatVersion: "2010-09-09"
Description: Application secrets for the video transcoding platform

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

  ResendFromEmail:
    Type: String
    Default: noreply@example.com
    Description: Sender address for transactional email (update to your domain)

Resources:
  BetterAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "vtp/${Environment}/auth"
      Description: BETTER_AUTH_SECRET for the VTP API
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: secret
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-auth"
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

  ResendApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "vtp/${Environment}/resend"
      Description: RESEND_API_KEY for transactional email (replace placeholder after deploy)
      SecretString: REPLACE_WITH_RESEND_API_KEY
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-resend"
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BetterAuthSecretArn:
    Description: ARN for BETTER_AUTH_SECRET
    Value: !Ref BetterAuthSecret

  BetterAuthSecretName:
    Description: Secrets Manager name for BETTER_AUTH_SECRET
    Value: !Sub "vtp/${Environment}/auth"

  ResendApiKeySecretArn:
    Description: ARN for RESEND_API_KEY
    Value: !Ref ResendApiKeySecret

  ResendApiKeySecretName:
    Description: Secrets Manager name for RESEND_API_KEY
    Value: !Sub "vtp/${Environment}/resend"

  ResendFromEmail:
    Description: Configured sender address for transactional email
    Value: !Ref ResendFromEmail
