AWSTemplateFormatVersion: "2010-09-09"
Description: Application secrets for the video transcoding platform

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

  RdsProxyEndpoint:
    Type: String
    Description: RDS Proxy endpoint hostname from shared-database stack

  DatabaseName:
    Type: String
    Default: transcodingDB

  DatabaseUsername:
    Type: String
    Default: postgres

  DatabasePort:
    Type: Number
    Default: 5432

  ResendFromEmail:
    Type: String
    Default: noreply@example.com
    Description: Sender address for transactional email (update to your domain)

Resources:
  BetterAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "vtp/${Environment}/better-auth-secret"
      Description: BETTER_AUTH_SECRET for the VTP API
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: secret
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-better-auth-secret"
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

  ResendApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "vtp/${Environment}/resend-api-key"
      Description: RESEND_API_KEY for transactional email (replace placeholder after deploy)
      SecretString: REPLACE_WITH_RESEND_API_KEY
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-resend-api-key"
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "vtp/${Environment}/database-url"
      Description: >-
        DATABASE_URL for ECS tasks via RDS Proxy. Replace UPDATE_PASSWORD with the
        password from the RDS-managed secret in shared-database after first deploy.
      SecretString: !Sub
        - "postgresql://${DatabaseUsername}:UPDATE_PASSWORD@${ProxyHost}:${DatabasePort}/${DatabaseName}?sslmode=require"
        - ProxyHost: !Ref RdsProxyEndpoint
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-database-url"
        - Key: Project
          Value: video-transcoding
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BetterAuthSecretArn:
    Description: ARN for BETTER_AUTH_SECRET
    Value: !Ref BetterAuthSecret

  BetterAuthSecretName:
    Description: Secrets Manager name for BETTER_AUTH_SECRET
    Value: !Sub "vtp/${Environment}/better-auth-secret"

  ResendApiKeySecretArn:
    Description: ARN for RESEND_API_KEY
    Value: !Ref ResendApiKeySecret

  ResendApiKeySecretName:
    Description: Secrets Manager name for RESEND_API_KEY
    Value: !Sub "vtp/${Environment}/resend-api-key"

  DatabaseUrlSecretArn:
    Description: ARN for DATABASE_URL
    Value: !Ref DatabaseUrlSecret

  DatabaseUrlSecretName:
    Description: Secrets Manager name for DATABASE_URL
    Value: !Sub "vtp/${Environment}/database-url"

  ResendFromEmail:
    Description: Configured sender address for transactional email
    Value: !Ref ResendFromEmail
