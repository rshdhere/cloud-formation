AWSTemplateFormatVersion: "2010-09-09"
Description: API Gateway HTTP API and WAF for VTP API traffic

Parameters:
  Environment:
    Type: String
    Default: prod

  DomainName:
    Type: String
    Default: example.com

  AlbIntegrationUrl:
    Type: String
    Description: ALB base URL for HTTP proxy integration (http or https)

  ApiRateLimit:
    Type: Number
    Default: 1000
    Description: WAF rate limit per 5-minute window per IP

  RegionalCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in the stack region for api.domain custom domain

Conditions:
  HasRegionalCertificate: !Not [!Equals [!Ref RegionalCertificateArn, ""]]

Resources:
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "vtp-${Environment}-api-waf"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "vtp-${Environment}-api-waf"
      Rules:
        - Name: RateLimitPerIp
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref ApiRateLimit
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "vtp-${Environment}-api-rate-limit"
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "vtp-${Environment}-api-common-rules"
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "vtp-${Environment}-api-bad-inputs"
      Tags:
        - Key: Name
          Value: !Sub "vtp-${Environment}-api-waf"
        - Key: Project
          Value: video-transcoding

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "vtp-${Environment}-api"
      ProtocolType: HTTP
      Tags:
        Name: !Sub "vtp-${Environment}-api"

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Ref AlbIntegrationUrl
      PayloadFormatVersion: "1.0"
      ConnectionType: INTERNET
      TimeoutInMillis: 30000
      RequestParameters:
        "overwrite:header.host": !Sub "api.${DomainName}"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    DependsOn: HttpApiIntegration
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 500
        ThrottlingRateLimit: 1000
      Tags:
        Name: !Sub "vtp-${Environment}-api-stage"

  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn:
      - HttpApiStage
      - HttpApiDefaultRoute
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/apis/${HttpApi}/stages/${HttpApiStage}"
      WebACLArn: !GetAtt WebACL.Arn

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasRegionalCertificate
    Properties:
      DomainName: !Sub "api.${DomainName}"
      DomainNameConfigurations:
        - CertificateArn: !Ref RegionalCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2
      Tags:
        Name: !Sub "vtp-${Environment}-api-domain"

  ApiDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasRegionalCertificate
    DependsOn: ApiCustomDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiCustomDomain
      Stage: !Ref HttpApiStage

Outputs:
  HttpApiId:
    Description: API Gateway HTTP API ID
    Value: !Ref HttpApi

  HttpApiEndpoint:
    Description: Public API URL (custom domain or execute-api endpoint)
    Value: !If
      - HasRegionalCertificate
      - !Sub "https://api.${DomainName}"
      - !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  HttpApiStageArn:
    Description: API Gateway stage ARN
    Value: !Sub "arn:aws:apigateway:${AWS::Region}::/apis/${HttpApi}/stages/${HttpApiStage}"

  WebAclArn:
    Description: WAF WebACL ARN
    Value: !GetAtt WebACL.Arn

  ApiCustomDomainName:
    Description: Custom API domain (api.domain) when certificate is configured
    Condition: HasRegionalCertificate
    Value: !Sub "api.${DomainName}"

  ApiRegionalDomainName:
    Description: API Gateway regional domain for Route 53 alias
    Value: !If
      - HasRegionalCertificate
      - !GetAtt ApiCustomDomain.RegionalDomainName
      - ""

  ApiRegionalHostedZoneId:
    Description: API Gateway regional hosted zone ID for Route 53 alias
    Value: !If
      - HasRegionalCertificate
      - !GetAtt ApiCustomDomain.RegionalHostedZoneId
      - ""
