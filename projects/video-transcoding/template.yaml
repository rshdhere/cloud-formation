AWSTemplateFormatVersion: "2010-09-09"
Description: Video transcoding platform infrastructure

Parameters:
  TemplateBucketName:
    Type: String
    Description: S3 bucket containing nested CloudFormation templates

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

  UploadsBucketName:
    Type: String
    Default: vtp-uploads

  TranscodedBucketName:
    Type: String
    Default: vtp-transcoded

  CorsAllowedOrigins:
    Type: CommaDelimitedList
    Default: "*"
    Description: Origins allowed for browser-based uploads and playback

  TranscodingQueueName:
    Type: String
    Default: vtp-transcoding

  EmailVerificationQueueName:
    Type: String
    Default: vtp-email-verification

Resources:
  S3Stack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.${AWS::Region}.amazonaws.com/projects/video-transcoding/services/S3.yaml"
      Parameters:
        Environment: !Ref Environment
        UploadsBucketName: !Ref UploadsBucketName
        TranscodedBucketName: !Ref TranscodedBucketName
        CorsAllowedOrigins: !Join
          - ","
          - !Ref CorsAllowedOrigins

  QueuesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.${AWS::Region}.amazonaws.com/projects/video-transcoding/services/SQS.yaml"
      Parameters:
        Environment: !Ref Environment
        TranscodingQueueName: !Ref TranscodingQueueName
        EmailVerificationQueueName: !Ref EmailVerificationQueueName

Outputs:
  UploadsBucketName:
    Description: Raw video uploads bucket name
    Value: !GetAtt S3Stack.Outputs.UploadsBucketName
    Export:
      Name: !Sub "${AWS::StackName}-UploadsBucketName"

  UploadsBucketArn:
    Description: Raw video uploads bucket ARN
    Value: !GetAtt S3Stack.Outputs.UploadsBucketArn
    Export:
      Name: !Sub "${AWS::StackName}-UploadsBucketArn"

  TranscodedBucketName:
    Description: Transcoded video outputs bucket name
    Value: !GetAtt S3Stack.Outputs.TranscodedBucketName
    Export:
      Name: !Sub "${AWS::StackName}-TranscodedBucketName"

  TranscodedBucketArn:
    Description: Transcoded video outputs bucket ARN
    Value: !GetAtt S3Stack.Outputs.TranscodedBucketArn
    Export:
      Name: !Sub "${AWS::StackName}-TranscodedBucketArn"

  SqsTranscodingQueueUrl:
    Description: SQS_TRANSCODING_QUEUE_URL
    Value: !GetAtt QueuesStack.Outputs.SqsTranscodingQueueUrl
    Export:
      Name: !Sub "${AWS::StackName}-SqsTranscodingQueueUrl"

  SqsEmailVerificationQueueUrl:
    Description: SQS_EMAIL_VERIFICATION_QUEUE_URL
    Value: !GetAtt QueuesStack.Outputs.SqsEmailVerificationQueueUrl
    Export:
      Name: !Sub "${AWS::StackName}-SqsEmailVerificationQueueUrl"

  TranscodingQueueArn:
    Description: ARN for the video transcoding queue
    Value: !GetAtt QueuesStack.Outputs.TranscodingQueueArn
    Export:
      Name: !Sub "${AWS::StackName}-TranscodingQueueArn"

  EmailVerificationQueueArn:
    Description: ARN for the email verification queue
    Value: !GetAtt QueuesStack.Outputs.EmailVerificationQueueArn
    Export:
      Name: !Sub "${AWS::StackName}-EmailVerificationQueueArn"
